set-option -sg escape-time 10

# Catppuccin settings BEFORE loading
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"

# Load plugin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Override status-right
set -g status-right '#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '
set -g status-right-length 100

# Styled window status formats with Catppuccin colors
set -g window-status-format "#[fg=#{@thm_fg},bg=#{@thm_bg}] #W "
set -g window-status-current-format "#[fg=#{@thm_crust},bg=#{@thm_mauve},bold] #W "
